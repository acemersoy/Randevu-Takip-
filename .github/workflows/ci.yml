name: Build and Test

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  backend-build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 9.0.x
    - name: Restore dependencies
      run: dotnet restore src/backend/RandevuTakip.Api/RandevuTakip.Api.csproj
    - name: Build
      run: dotnet build src/backend/RandevuTakip.Api/RandevuTakip.Api.csproj --no-restore
    - name: Test
      run: dotnet test src/backend/RandevuTakip.Api/RandevuTakip.Api.csproj --no-build --verbosity normal

  frontend-build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Use Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
    - name: Install dependencies
      run: cd src/frontend && npm install
    - name: Build
      run: cd src/frontend && npm run build
