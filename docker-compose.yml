services:
  db:
    image: postgres:16-alpine
    container_name: randevutakip-db
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: randevutakip_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: randevutakip-redis
    ports:
      - "6379:6379"

volumes:
  postgres_data:
