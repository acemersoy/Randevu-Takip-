services:
  db:
    image: postgres:16-alpine
    container_name: randevutakip-db
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: randevutakip_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - randevutakip_network
    restart: always

  redis:
    image: redis:7-alpine
    container_name: randevutakip-redis
    ports:
      - "6379:6379"
    networks:
      - randevutakip_network
    restart: always

  api:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: randevutakip-api
    ports:
      - "5032:8080"
    environment:
      - ConnectionStrings__DefaultConnection=Host=db;Database=randevutakip_db;Username=admin;Password=password123
      - ConnectionStrings__Redis=redis:6379
      - ASPNETCORE_ENVIRONMENT=Production
    depends_on:
      - db
      - redis
    networks:
      - randevutakip_network
    restart: always

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: randevutakip-frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:5032/api
    depends_on:
      - api
    networks:
      - randevutakip_network
    restart: always

networks:
  randevutakip_network:
    driver: bridge

volumes:
  postgres_data:
